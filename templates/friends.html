<!DOCTYPE html>
<html>
<head>
    <title>Friends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">Gaming Platform</a>
        <div class="navbar-nav flex-row gap-3">
            <a class="nav-link" href="/">Users</a>
            <a class="nav-link" href="/games">Games</a>
            <a class="nav-link" href="/sessions">Sessions</a>
            <a class="nav-link" href="/achievements">Achievements</a>
            <a class="nav-link" href="/purchases">Purchases</a>
            <a class="nav-link active" href="/friends">Friends</a>
            <a class="nav-link text-warning" href="/reports">Reports</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Friends</h2>
        <a href="/friends/add" class="btn btn-primary">+ Add Friend</a>
    </div>

    <table class="table table-striped table-bordered shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>User</th>
                <th>Friend</th>
                <th>Since</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        {% if friends %}
            {% for f in friends %}
            <tr>
                <td>{{ f[0] }}</td>
                <td>{{ f[1] }}</td>
                <td>{{ f[2].strftime('%b %d, %Y') }}</td>
                <td>
                    <a href="/friends/delete/{{ f[3] }}/{{ f[4] }}" class="btn btn-sm btn-danger"
                        onclick="return confirm('Remove this friendship?')">Remove</a>
                </td>
            </tr>
            {% endfor %}
        {% else %}
            <tr>
                <td colspan="4" class="text-center text-muted">No friends found</td>
            </tr>
        {% endif %}
        </tbody>
    </table>
</div>
</body>
</html>
