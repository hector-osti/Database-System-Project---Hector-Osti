<!DOCTYPE html>
<html>
    <head>
        <title>Log Session</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">Gaming Platform</a>
        <div class="navbar-nav flex-row gap-3">
            <a class="nav-link" href="/">Users</a>
            <a class="nav-link" href="/games">Games</a>
            <a class="nav-link active" href="/sessions">Sessions</a>
            <a class="nav-link" href="/achievements">Achievements</a>
            <a class="nav-link" href="/purchases">Purchases</a>
            <a class="nav-link" href="/friends">Friends</a>
            <a class="nav-link text-warning" href="/reports">Reports</a>
        </div>
    </div>
</nav>
        
<div class="container" style="max-width:500px">
        <h2 class="mb-3">Log Game Session</h2>
        <p class="text-muted small">Achievements are auto-awarded by trigger when a session is logged.</p>
        <form method="POST" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label class="form-label">Player</label>
                <select name="user_id" class="form-select" required>
                    <option value="">-- Select player --</option>
                    {% for u in users %}
                    <option value="{{ u[0] }}">{{ u[1] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Game</label>
                <select name="game_id" class="form-select" required>
                    <option value="">-- Select game --</option>
                    {% for g in games %}
                    <option value="{{ g[0] }}">{{ g[1] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Start Time</label>
                <input type="datetime-local" name="start_time" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">End Time <span class="text-muted">(leave blank if still playing)</span></label>
                <input type="datetime-local" name="end_time" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Score</label>
                <input type="number" name="score" min="0" value="0" class="form-control" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Log Session</button>
                <a href="/sessions" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
    </body>
</html>
