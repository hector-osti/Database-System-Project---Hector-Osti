<!DOCTYPE html>
<html>
    <head>
        <title>Edit User</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">Gaming Platform</a>
        <div class="navbar-nav flex-row gap-3">
            <a class="nav-link" href="/">Users</a>
            <a class="nav-link" href="/games">Games</a>
            <a class="nav-link" href="/sessions">Sessions</a>
            <a class="nav-link" href="/achievements">Achievements</a>
            <a class="nav-link" href="/purchases">Purchases</a>
            <a class="nav-link" href="/friends">Friends</a>
            <a class="nav-link text-warning" href="/reports">Reports</a>
        </div>
    </div>
</nav>
    <div class="container" style="max-width:500px">
        <h2 class="mb-3">Edit User</h2>

        <form method="POST" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" value="{{ user[1] }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="text" name="email" value="{{ user[2] }}" class="form-control" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning">Update</button>
                <a href="/" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
    </body>
</html>
