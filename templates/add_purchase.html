<!DOCTYPE html>
<html>
    <head>
        <title>Add Purchase</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">Gaming Platform</a>
        <div class="navbar-nav flex-row gap-3">
            <a class="nav-link" href="/">Users</a>
            <a class="nav-link" href="/games">Games</a>
            <a class="nav-link" href="/sessions">Sessions</a>
            <a class="nav-link" href="/achievements">Achievements</a>
            <a class="nav-link active" href="/purchases">Purchases</a>
            <a class="nav-link" href="/friends">Friends</a>
            <a class="nav-link text-warning" href="/reports">Reports</a>
        </div>
    </div>
</nav>
        
<div class="container" style="max-width:500px">
        <h2 class="mb-3">Add Purchase</h2>
        <form method="POST" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label class="form-label">User</label>
                <select name="user_id" class="form-select" required>
                    <option value="">-- Select user --</option>
                    {% for u in users %}
                    <option value="{{ u[0] }}">{{ u[1] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Game</label>
                <select name="game_id" class="form-select" required id="game-select">
                    <option value="">-- Select game --</option>
                    {% for g in games %}
                    <option value="{{ g[0] }}" data-price="{{ g[2] }}">{{ g[1] }} (${{ "%.2f"|format(g[2]) }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Amount Paid ($)</label>
                <input type="number" name="amount_paid" step="0.01" min="0" id="amount-paid" class="form-control" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Record Purchase</button>
                <a href="/purchases" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
    <script>
        document.getElementById('game-select').addEventListener('change', function() {
            const price = this.selectedOptions[0]?.dataset.price || '';
            document.getElementById('amount-paid').value = price;
        });
    </script>
    </body>
</html>
