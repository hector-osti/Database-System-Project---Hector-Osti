<!DOCTYPE html>
<html>
    <head>
        <title>Add Friend</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">Gaming Platform</a>
        <div class="navbar-nav flex-row gap-3">
            <a class="nav-link" href="/">Users</a>
            <a class="nav-link" href="/games">Games</a>
            <a class="nav-link" href="/sessions">Sessions</a>
            <a class="nav-link" href="/achievements">Achievements</a>
            <a class="nav-link" href="/purchases">Purchases</a>
            <a class="nav-link active" href="/friends">Friends</a>
            <a class="nav-link text-warning" href="/reports">Reports</a>
        </div>
    </div>
</nav>
        
<div class="container" style="max-width:500px">
        <h2 class="mb-3">Add Friend</h2>
        <form method="POST" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label class="form-label">User</label>
                <select name="user_id" class="form-select" required>
                    <option value="">-- Select user --</option>
                    {% for u in users %}
                    <option value="{{ u[0] }}">{{ u[1] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Friend</label>
                <select name="friend_id" class="form-select" required>
                    <option value="">-- Select friend --</option>
                    {% for u in users %}
                    <option value="{{ u[0] }}">{{ u[1] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Add Friend</button>
                <a href="/friends" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
    </body>
</html>
